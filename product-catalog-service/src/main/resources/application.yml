server:
  port: 8082
spring:
  application:
    name: product-catalog-service
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://localhost:5432/ecommerce_products}
    username: ${PRODUCT_DB_USERNAME:postgres}
    password: ${PRODUCT_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
resilience4j.circuitbreaker.instances.default:
  sliding-window-size: 10
  failure-rate-threshold: 50
  wait-duration-in-open-state: 10s
